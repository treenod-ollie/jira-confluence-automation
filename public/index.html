<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐰 JIRA 티켓 자동 생성 - 빌드 관리</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #2ECC71 0%, #27AE60 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 500px;
      width: 100%;
      padding: 40px;
    }

    h1 {
      font-size: 24px;
      color: #333;
      margin-bottom: 10px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: #666;
      font-size: 14px;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #333;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #2ECC71;
      box-shadow: 0 0 0 3px rgba(46, 204, 113, 0.1);
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #2ECC71 0%, #27AE60 100%);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 20px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(46, 204, 113, 0.3);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .alert {
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }

    .alert.success {
      display: block;
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .alert.error {
      display: block;
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .alert a {
      color: inherit;
      font-weight: 600;
      text-decoration: underline;
    }

    .loading {
      display: none;
      text-align: center;
      color: #2ECC71;
      font-size: 14px;
    }

    .loading.active {
      display: block;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #f3f3f3;
      border-top: 2px solid #2ECC71;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .helper-text {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }

    .results {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #eee;
      display: none;
    }

    .results.active {
      display: block;
    }

    .result-item {
      margin-bottom: 12px;
      padding: 10px;
      background: #f0fdf4;
      border-left: 4px solid #2ECC71;
      border-radius: 4px;
    }

    .result-item.error {
      border-left-color: #dc3545;
      background: #fff5f5;
    }

    .result-item-title {
      font-weight: 500;
      color: #333;
      margin-bottom: 4px;
    }

    .result-item-ticket {
      font-size: 12px;
      color: #666;
    }

    .result-item-ticket a {
      color: #2ECC71;
      text-decoration: none;
      font-weight: 600;
    }

    .result-summary {
      font-size: 14px;
      color: #333;
      font-weight: 500;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🐰 JIRA 티켓 자동 생성</h1>
    <p class="subtitle">✨ 빌드와 담당자만 입력하면 자동으로 티켓을 생성해요</p>

    <div id="alertContainer"></div>

    <form id="ticketForm">
      <div class="form-group">
        <label for="buildNumber">빌드 번호 *</label>
        <input
          type="text"
          id="buildNumber"
          name="buildNumber"
          placeholder="예: 3.32.0"
          required
        >
        <div class="helper-text">[PKPK]3.32.0 형식의 빌드 번호</div>
      </div>

      <div class="form-group">
        <label for="assignee">담당자 *</label>
        <input
          type="text"
          id="assignee"
          name="assignee"
          placeholder="예: Ollie 또는 @Ollie"
          required
        >
        <div class="helper-text">Confluence 테이블에 등록된 담당자명</div>
      </div>

      <button type="submit" id="submitBtn">🐰 티켓 생성</button>
    </form>

    <div class="loading" id="loading">
      <span class="spinner"></span> 처리 중...
    </div>

    <div class="results" id="results">
      <div id="resultsSummary" class="result-summary"></div>
      <div id="ticketsList"></div>
    </div>
  </div>

  <script>
    const form = document.getElementById('ticketForm');
    const alertContainer = document.getElementById('alertContainer');
    const loading = document.getElementById('loading');
    const results = document.getElementById('results');
    const resultsSummary = document.getElementById('resultsSummary');
    const ticketsList = document.getElementById('ticketsList');

    // 알림 표시
    function showAlert(message, type = 'error', timeout = 5000) {
      const alert = document.createElement('div');
      alert.className = `alert ${type}`;
      alert.textContent = `${type === 'success' ? '✅' : '❌'} ${message}`;
      alertContainer.innerHTML = '';
      alertContainer.appendChild(alert);

      if (type === 'success') {
        setTimeout(() => {
          alert.style.display = 'none';
        }, 5000);
      }
    }

    // 폼 제출
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const buildNumber = document.getElementById('buildNumber').value.trim();
      const assignee = document.getElementById('assignee').value.trim();

      if (!buildNumber || !assignee) {
        showAlert('빌드 번호와 담당자를 입력해주세요.', 'error');
        return;
      }

      loading.classList.add('active');
      alertContainer.innerHTML = '';
      results.classList.remove('active');

      try {
        const response = await fetch('/api/create-tickets', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            buildNumber,
            assignee
          })
        });

        const data = await response.json();

        if (!response.ok) {
          showAlert(data.error, 'error');
        } else {
          // 결과 표시
          const total = data.createdTickets.length;
          resultsSummary.innerHTML = `✅ ${total}개의 티켓이 생성되었습니다.`;

          ticketsList.innerHTML = '';
          data.createdTickets.forEach(ticket => {
            const item = document.createElement('div');
            item.className = 'result-item';
            item.innerHTML = `
              <div class="result-item-title">${ticket.title}</div>
              <div class="result-item-ticket">
                <a href="${ticket.ticketUrl}" target="_blank">${ticket.ticketKey}</a>
              </div>
            `;
            ticketsList.appendChild(item);
          });

          if (data.errors && data.errors.length > 0) {
            const errorTitle = document.createElement('div');
            errorTitle.style.marginTop = '15px';
            errorTitle.style.fontWeight = '500';
            errorTitle.style.color = '#666';
            errorTitle.innerHTML = '⚠️ 처리 중 오류:';
            ticketsList.appendChild(errorTitle);

            data.errors.forEach(error => {
              const item = document.createElement('div');
              item.className = 'result-item error';
              item.innerHTML = `
                <div class="result-item-title">${error.page}</div>
                <div class="result-item-ticket">${error.error}</div>
              `;
              ticketsList.appendChild(item);
            });
          }

          results.classList.add('active');
          showAlert(`${total}개의 티켓이 생성되었습니다!`, 'success');
          form.reset();
        }
      } catch (error) {
        showAlert(error.message, 'error');
      } finally {
        loading.classList.remove('active');
      }
    });
  </script>
</body>
</html>
